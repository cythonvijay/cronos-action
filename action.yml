name: 'CRONOS Code Guard'
description: 'Enterprise code intelligence: AST, semantic, security, quality, AI explanation'
author: 'cythonvijay'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api_url:
    description: 'CRONOS API base URL'
    required: true
  mode:
    description: 'STRICT | BOUNDARY | CONTRACT'
    required: false
    default: 'STRICT'
  github_token:
    description: 'GitHub token for PR comments and annotations'
    required: false
    default: ''
  pr_number:
    description: 'PR number (auto-detected)'
    required: false
    default: ''
  repo:
    description: 'owner/repo slug'
    required: false
    default: ''
  fail_on_severity:
    description: 'CRITICAL|HIGH|MEDIUM|LOW|SAFE'
    required: false
    default: 'HIGH'
  post_pr_comment:
    description: 'Post PR comment (true/false)'
    required: false
    default: 'true'
  create_annotations:
    description: 'Create Check Run annotations (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:

    - name: Install jq and curl
      shell: bash
      run: command -v jq &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq curl)

    - name: Run CRONOS Analysis
      shell: bash
      env:
        API_URL:          ${{ inputs.api_url }}
        MODE:             ${{ inputs.mode }}
        GH_TOKEN:         ${{ inputs.github_token }}
        PR_NUM:           ${{ inputs.pr_number }}
        REPO_SLUG:        ${{ inputs.repo }}
        FAIL_SEVERITY:    ${{ inputs.fail_on_severity }}
        POST_COMMENT:     ${{ inputs.post_pr_comment }}
        CREATE_ANNOT:     ${{ inputs.create_annotations }}
      run: |
        set -euo pipefail

        API_URL="${API_URL%/}"
        REPORT_DIR="cronos-reports"
        mkdir -p "$REPORT_DIR"

        REPO="${REPO_SLUG:-${GITHUB_REPOSITORY:-}}"
        OWNER="${REPO%%/*}"
        REPO_NAME="${REPO##*/}"
        SHA="${GITHUB_SHA:-}"
        TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"

        # Auto-detect PR number
        PR_NUMBER="${PR_NUM:-}"
        if [ -z "$PR_NUMBER" ] && [ -n "${GITHUB_EVENT_PATH:-}" ] && [ -f "${GITHUB_EVENT_PATH}" ]; then
          PR_NUMBER=$(jq -r '(.pull_request.number // .number // "") | tostring' "${GITHUB_EVENT_PATH}" 2>/dev/null || echo "")
          [ "$PR_NUMBER" = "null" ] && PR_NUMBER=""
        fi

        echo "=============================================================="
        echo "  CRONOS v8 | Mode=$MODE | Repo=$REPO | PR=${PR_NUMBER:-none}"
        echo "=============================================================="

        # Health check
        set +e; curl -sf --max-time 15 "$API_URL/" >/dev/null 2>&1; HC=$?; set -e
        if [ "$HC" -ne 0 ]; then
          echo "ERROR: CRONOS API unreachable at $API_URL"
          echo "## CRONOS ERROR: API unreachable" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
        echo "API OK"

        # ── Detect changed files (ALL files, no extension filter) ─────────
        # fetch-depth:0 ensures full history is available
        # We detect every file that changed — not just .py
        # This is the CORE fix: testcase, testcase2.py, age.py — ALL caught
        FILES=""
        if git rev-parse HEAD~1 >/dev/null 2>&1; then
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
        else
          # First commit — analyze all tracked files
          FILES=$(git ls-files 2>/dev/null || true)
        fi

        if [ -z "$FILES" ]; then
          echo "No files changed — skipping."
          echo "## CRONOS [$MODE]: No files changed" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        echo "Changed files:"
        echo "$FILES" | sed 's/^/  /'

        # Severity rank helper
        sev_rank() {
          case "$1" in
            CRITICAL) echo 4 ;; HIGH) echo 3 ;; MEDIUM) echo 2 ;; LOW) echo 1 ;; *) echo 0 ;;
          esac
        }
        FAIL_RANK=$(sev_rank "$FAIL_SEVERITY")

        FAIL_COUNT=0; WARN_COUNT=0; PASS_COUNT=0; TOTAL=0; LAST_REPORT_ID=""

        # ── Per-file loop ────────────────────────────────────────────────
        while IFS= read -r FILE; do
          [ -z "$FILE" ] && continue
          # Skip binary files and directories
          [ -d "$FILE" ] && continue

          TOTAL=$((TOTAL+1))
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Analyzing: $FILE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Get old version (before this commit)
          OLD_CODE=""
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            OLD_CODE=$(git show HEAD~1:"$FILE" 2>/dev/null || echo "")
          fi

          # Get new version (current)
          NEW_CODE=""
          if [ -f "$FILE" ]; then
            NEW_CODE=$(cat "$FILE" 2>/dev/null || echo "")
          fi

          if [ -z "$NEW_CODE" ] && [ -z "$OLD_CODE" ]; then
            echo "  Skipping — file empty or unreadable"
            continue
          fi

          # Build JSON payload safely with jq
          PAYLOAD=$(jq -n \
            --arg old  "$OLD_CODE" \
            --arg new  "$NEW_CODE" \
            --arg mode "$MODE" \
            --arg repo "$REPO" \
            --arg file "$FILE" \
            '{old_code:$old, new_code:$new, mode:$mode, repo:$repo, file:$file}')

          # Call /analyze_full with retry
          RES_F=$(mktemp)
          HTTP="000"; CE=1
          for ATTEMPT in 1 2 3; do
            set +e
            HTTP=$(curl -s -w "%{http_code}" -o "$RES_F" \
              -X POST "$API_URL/analyze_full" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              --max-time 90 \
              -d "$PAYLOAD" 2>/dev/null)
            CE=$?
            set -e
            [ "$CE" -eq 0 ] && [ "$HTTP" = "200" ] && break
            echo "  Attempt $ATTEMPT failed (HTTP=$HTTP curl=$CE) — retrying..."
            sleep 3
          done

          SAFE_NAME=$(echo "$FILE" | tr '/' '_' | tr ' ' '_')
          REPORT="$REPORT_DIR/${MODE}_${SAFE_NAME}.json"

          # Validate response
          if [ "$CE" -ne 0 ] || [ "$HTTP" != "200" ]; then
            echo "{\"status\":\"FAIL\",\"risk_score\":100,\"severity\":\"CRITICAL\",\"file\":\"$FILE\",\"mode\":\"$MODE\",\"summary\":[\"API error HTTP=$HTTP\"],\"pass\":false,\"warn\":false,\"fail\":true,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > "$REPORT"
            echo "  API error HTTP=$HTTP"
            rm -f "$RES_F"; FAIL_COUNT=$((FAIL_COUNT+1)); continue
          fi

          if ! jq empty "$RES_F" 2>/dev/null; then
            echo "{\"status\":\"FAIL\",\"risk_score\":100,\"severity\":\"CRITICAL\",\"file\":\"$FILE\",\"mode\":\"$MODE\",\"summary\":[\"Invalid JSON response\"],\"pass\":false,\"warn\":false,\"fail\":true}" > "$REPORT"
            rm -f "$RES_F"; FAIL_COUNT=$((FAIL_COUNT+1)); continue
          fi

          cp "$RES_F" "$REPORT"; rm -f "$RES_F"

          # Extract all fields
          STATUS=$(jq -r    '.status          // "FAIL"'    "$REPORT")
          SEVERITY=$(jq -r  '.severity        // "UNKNOWN"' "$REPORT")
          RISK=$(jq -r      '.risk_score // .risk // 0'     "$REPORT")
          SECURITY=$(jq -r  '.security_score  // "N/A"'     "$REPORT")
          QUALITY=$(jq -r   '.quality_score   // "N/A"'     "$REPORT")
          OVERALL=$(jq -r   '.overall_score   // "N/A"'     "$REPORT")
          REPORT_ID=$(jq -r '.report_id       // ""'        "$REPORT")
          OLD_HASH=$(jq -r  '.old_hash        // ""'        "$REPORT")
          NEW_HASH=$(jq -r  '.new_hash        // ""'        "$REPORT")
          SEM_HASH=$(jq -r  '.semantic_hash   // ""'        "$REPORT")
          TECH=$(jq -r      '.technical_explanation // ""'  "$REPORT")
          HUMAN=$(jq -r     '.human_explanation     // ""'  "$REPORT")
          REASON=$(jq -r    '.risk_reasoning        // ""'  "$REPORT")
          IMPACT=$(jq -r    '.behavioral_impact     // ""'  "$REPORT")
          AI_PROV=$(jq -r   '.ai_provider           // ""'  "$REPORT")
          BEH_CHG=$(jq -r   '.behavior.changed      // false' "$REPORT")
          BEH_SUM=$(jq -r   '.behavior.summary      // ""'  "$REPORT")
          CACHE_HIT=$(jq -r '.cache_hit             // false' "$REPORT")
          FINDINGS=$(jq -r  '.summary[]?'                    "$REPORT" | head -5 || true)

          [ -n "$REPORT_ID" ] && [ "$REPORT_ID" != "null" ] && LAST_REPORT_ID="$REPORT_ID"

          # Print full intelligence report to console
          echo ""
          echo "  ┌──────────────────────────────────────────────────────────┐"
          echo "  │  CRONOS [$MODE] Intelligence Report"
          echo "  ├──────────────────────────────────────────────────────────┤"
          printf "  │  File             : %-40s│\n" "$FILE"
          printf "  │  Status           : %-40s│\n" "$STATUS"
          printf "  │  Severity         : %-40s│\n" "$SEVERITY"
          printf "  │  Risk Score       : %-40s│\n" "${RISK}/100"
          printf "  │  Security Score   : %-40s│\n" "${SECURITY}/100"
          printf "  │  Quality Score    : %-40s│\n" "${QUALITY}/100"
          printf "  │  Overall Score    : %-40s│\n" "${OVERALL}/100"
          printf "  │  Cache Hit        : %-40s│\n" "$CACHE_HIT"
          printf "  │  AI Provider      : %-40s│\n" "$AI_PROV"
          echo "  ├──────────────────────────────────────────────────────────┤"
          printf "  │  Old Hash    : %-43s│\n" "${OLD_HASH:0:43}"
          printf "  │  New Hash    : %-43s│\n" "${NEW_HASH:0:43}"
          printf "  │  Sem Hash    : %-43s│\n" "${SEM_HASH:0:43}"
          echo "  ├──────────────────────────────────────────────────────────┤"
          printf "  │  Behavior Changed : %-40s│\n" "$BEH_CHG"
          [ -n "$BEH_SUM" ] && printf "  │  Behavior Summary : %-40s│\n" "${BEH_SUM:0:40}"
          echo "  └──────────────────────────────────────────────────────────┘"

          echo ""
          echo "  ── TECHNICAL EXPLANATION ───────────────────────────────────"
          [ -n "$TECH" ] && echo "$TECH" | fold -s -w 74 | sed 's/^/  /' || echo "  [Not available]"

          echo ""
          echo "  ── HUMAN EXPLANATION ───────────────────────────────────────"
          [ -n "$HUMAN" ] && echo "$HUMAN" | fold -s -w 74 | sed 's/^/  /' || echo "  [Not available]"

          echo ""
          echo "  ── RISK REASONING ──────────────────────────────────────────"
          [ -n "$REASON" ] && echo "$REASON" | fold -s -w 74 | sed 's/^/  /' || echo "  [Not available]"

          echo ""
          echo "  ── BEHAVIORAL IMPACT ───────────────────────────────────────"
          [ -n "$IMPACT" ] && echo "$IMPACT" | fold -s -w 74 | sed 's/^/  /' || echo "  [Not available]"

          if [ -n "$FINDINGS" ]; then
            echo ""
            echo "  ── FINDINGS ────────────────────────────────────────────────"
            echo "$FINDINGS" | sed 's/^/  • /'
          fi

          # Execution prediction
          EXEC_OUTS=$(jq -r '.execution_prediction.possible_outputs[]? // empty' "$REPORT" 2>/dev/null | head -5 || true)
          EXEC_EXCS=$(jq -r '.execution_prediction.exceptions[]?        // empty' "$REPORT" 2>/dev/null | head -3 || true)
          if [ -n "$EXEC_OUTS" ]; then
            echo ""
            echo "  ── EXECUTION PREDICTION ────────────────────────────────────"
            echo "$EXEC_OUTS" | sed 's/^/  • /'
          fi
          if [ -n "$EXEC_EXCS" ]; then
            echo "  ── EXCEPTION RISKS ─────────────────────────────────────────"
            echo "$EXEC_EXCS" | sed 's/^/  ⚠ /'
          fi

          # GitHub inline annotations
          if [ "$CREATE_ANNOT" = "true" ]; then
            ANN_MSG=$(echo "${HUMAN:-CRONOS detected issues}" | tr '\n' ' ' | cut -c1-250)
            if [ "$STATUS" = "FAIL" ]; then
              echo "::error file=$FILE,title=CRONOS [$MODE] $SEVERITY::$ANN_MSG"
            elif [ "$STATUS" = "WARN" ]; then
              echo "::warning file=$FILE,title=CRONOS [$MODE] $SEVERITY::$ANN_MSG"
            fi
          fi

          # GitHub Step Summary
          SEV_EMOJI="⚪"
          case "$SEVERITY" in
            CRITICAL) SEV_EMOJI="🔴" ;; HIGH) SEV_EMOJI="🟠" ;;
            MEDIUM)   SEV_EMOJI="🟡" ;; LOW)  SEV_EMOJI="🔵" ;; SAFE) SEV_EMOJI="🟢" ;;
          esac
          {
            echo "### ${SEV_EMOJI} [$MODE] ${SEVERITY} — \`${FILE}\`"
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Status | **${STATUS}** |"
            echo "| Risk Score | **${RISK}/100** |"
            echo "| Security Score | **${SECURITY}/100** |"
            echo "| Quality Score | **${QUALITY}/100** |"
            echo "| Overall Score | **${OVERALL}/100** |"
            echo "| Severity | **${SEVERITY}** |"
            echo "| Behavior Changed | **${BEH_CHG}** |"
            echo "| Cache Hit | ${CACHE_HIT} |"
            [ -n "$OLD_HASH" ] && echo "| Old Hash | \`${OLD_HASH:0:32}...\` |"
            [ -n "$NEW_HASH" ] && echo "| New Hash | \`${NEW_HASH:0:32}...\` |"
            [ -n "$SEM_HASH" ] && echo "| Semantic Hash | \`${SEM_HASH:0:32}...\` |"
            echo ""
            [ -n "$TECH" ]   && echo "> **Technical:** ${TECH:0:400}"
            [ -n "$HUMAN" ]  && echo "> **Human:** ${HUMAN:0:400}"
            [ -n "$REASON" ] && echo "> **Risk Reasoning:** ${REASON:0:300}"
            [ -n "$IMPACT" ] && echo "> **Behavioral Impact:** ${IMPACT:0:300}"
            if [ -n "$FINDINGS" ]; then
              echo ""
              echo "**Findings:**"
              echo "$FINDINGS" | sed 's/^/- /'
            fi
            [ -n "$REPORT_ID" ] && echo ""
            [ -n "$REPORT_ID" ] && echo "📥 [JSON]($API_URL/report/json/$REPORT_ID) | [PDF]($API_URL/report/pdf/$REPORT_ID)"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"

          # Verdict
          SEV_RANK=$(sev_rank "$SEVERITY")
          if [ "$SEV_RANK" -ge "$FAIL_RANK" ] && [ "$FAIL_RANK" -gt 0 ]; then
            echo ""
            echo "  🔴 FAIL: $FILE — Severity=$SEVERITY >= threshold=$FAIL_SEVERITY"
            FAIL_COUNT=$((FAIL_COUNT+1))
          elif [ "$STATUS" = "WARN" ]; then
            echo "  🟡 WARN: $FILE"
            WARN_COUNT=$((WARN_COUNT+1))
          else
            echo "  🟢 PASS: $FILE"
            PASS_COUNT=$((PASS_COUNT+1))
          fi

        done <<< "$FILES"

        # Post PR comment once after all files
        if [ "$POST_COMMENT" = "true" ] && [ -n "$TOKEN" ] && [ -n "$PR_NUMBER" ] && [ -n "$OWNER" ] && [ -n "$LAST_REPORT_ID" ]; then
          echo ""
          echo "Posting PR comment (report=$LAST_REPORT_ID)..."
          CP=$(jq -n \
            --arg rid   "$LAST_REPORT_ID" \
            --arg pr    "$PR_NUMBER" \
            --arg owner "$OWNER" \
            --arg repo  "$REPO_NAME" \
            --arg token "$TOKEN" \
            '{report_id:$rid, pr_number:($pr|tonumber), owner:$owner, repo:$repo, github_token:$token}')
          set +e
          PR_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/github/pr_comment" \
            -H "Content-Type: application/json" -d "$CP" --max-time 30 2>/dev/null || echo "000")
          set -e
          [ "$PR_HTTP" = "200" ] && echo "PR comment posted" || echo "PR comment HTTP=$PR_HTTP (non-fatal)"
        fi

        # Final summary
        echo ""
        echo "=============================================================="
        echo "  [$MODE] Total=$TOTAL Pass=$PASS_COUNT Warn=$WARN_COUNT Fail=$FAIL_COUNT"
        echo "=============================================================="
        {
          echo "## CRONOS [$MODE] Summary"
          echo "| | Count |"
          echo "|---|---|"
          echo "| 🟢 Passed | $PASS_COUNT |"
          echo "| 🟡 Warned | $WARN_COUNT |"
          echo "| 🔴 Failed | $FAIL_COUNT |"
          echo "| Total | $TOTAL |"
        } >> "$GITHUB_STEP_SUMMARY"

        if [ "$FAIL_COUNT" -gt 0 ]; then
          echo "BUILD BLOCKED: $FAIL_COUNT file(s) failed [$MODE] severity gate ($FAIL_SEVERITY)"
          exit 1
        fi
        echo "BUILD APPROVED [$MODE]"
        exit 0
