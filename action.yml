              FAIL=1
          # ── Severity-based fail gate ──────────────────────────────────────
          # Map severity levels to numeric ranks for comparison
          rank_severity() {
            case "$1" in
              CRITICAL) echo 4 ;;
              HIGH)     echo 3 ;;
              MEDIUM)   echo 2 ;;
              LOW)      echo 1 ;;
              SAFE)     echo 0 ;;
              *)        echo 0 ;;
            esac
          }

          SEV_RANK=$(rank_severity "$SEVERITY")
          FAIL_RANK=$(rank_severity "$FAIL_LEVEL")

          if [ "$SEV_RANK" -ge "$FAIL_RANK" ] && [ "$FAIL_RANK" -gt 0 ]; then
            echo ""
